<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypertension Diagnostic</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=4.0">
    
    <style>
        .alert-overlay {
            position: fixed;
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh;
            pointer-events: none; /* Lets you click the form beneath the light */
            z-index: 9999; /* Forces the glow to sit on top of everything */
        }

        .blink-red { animation: redSiren 1.5s infinite ease-in-out; }
        .blink-green { animation: greenSiren 1.5s infinite ease-in-out; }

        @keyframes redSiren {
            0% { box-shadow: inset 0 0 0px 0px rgba(255, 0, 0, 0); }
            50% { box-shadow: inset 0 0 120px 40px rgba(220, 53, 69, 0.9); }
            100% { box-shadow: inset 0 0 0px 0px rgba(255, 0, 0, 0); }
        }

        @keyframes greenSiren {
            0% { box-shadow: inset 0 0 0px 0px rgba(0, 255, 0, 0); }
            50% { box-shadow: inset 0 0 120px 40px rgba(40, 167, 69, 0.9); }
            100% { box-shadow: inset 0 0 0px 0px rgba(0, 255, 0, 0); }
        }
    </style>
</head>
<body>

    {% if bg_status == 'danger-bg' %}
        <div class="alert-overlay blink-red"></div>
    {% elif bg_status == 'safe-bg' %}
        <div class="alert-overlay blink-green"></div>
    {% endif %}

    <div class="medical-container">
        <header class="medical-header">
            <h2>Hypertension Risk Assessment</h2>
        </header>

        <form action="/predict" method="post" class="diagnostic-form">
            <div class="form-grid">
                <div class="form-group">
                    <label>Patient Age</label>
                    <input type="number" name="Age" required>
                </div>
                <div class="form-group">
                    <label>BMI (kg/m²)</label>
                    <input type="number" name="BMI" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>Salt Intake (g/day)</label>
                    <input type="number" name="Salt_Intake" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>Sleep Duration (Hrs)</label>
                    <input type="number" name="Sleep_Duration" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>Stress Score (0-10)</label>
                    <input type="number" name="Stress_Score" min="0" max="10" required>
                </div>
                
                <div class="form-group">
                    <label>BP History</label>
                    <select name="BP_History" required>
                        {% for opt in bp_history_options %}<option value="{{ opt }}">{{ opt }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Medication Status</label>
                    <select name="Medication" required>
                        {% for opt in medication_options %}<option value="{{ opt }}">{{ opt }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Family History</label>
                    <select name="Family_History" required>
                        {% for opt in family_history_options %}<option value="{{ opt }}">{{ opt }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Exercise Level</label>
                    <select name="Exercise_Level" required>
                        {% for opt in exercise_level_options %}<option value="{{ opt }}">{{ opt }}</option>{% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Smoking Status</label>
                    <select name="Smoking_Status" required>
                        {% for opt in smoking_status_options %}<option value="{{ opt }}">{{ opt }}</option>{% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="predict-btn">RUN DIAGNOSTIC ANALYSIS</button>
        </form>

        {% if error_message %}
        <div class="error-card">{{ error_message }}</div>
        {% endif %}

        {% if prediction_text %}
        <div class="result-card">
            <h3>{{ prediction_text }}</h3>
        </div>
        {% endif %}
    </div>
</body>
</html>
